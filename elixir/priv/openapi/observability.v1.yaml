openapi: 3.1.0
info:
  title: Symphony Observability API
  version: v1
  description: |
    API contract for the Symphony observability surface used by `agents-web`.

    This spec covers snapshot, issue detail, activity history/streaming, refresh, and
    runtime configuration endpoints served from the local Symphony process.
servers:
  - url: http://127.0.0.1:4000
paths:
  /api/v1/state:
    get:
      summary: Get current orchestrator state snapshot
      operationId: getState
      responses:
        "200":
          description: Snapshot response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StateResponse"
                  - $ref: "#/components/schemas/ErrorSnapshotResponse"

  /api/v1/issues:
    get:
      summary: Get issue summaries for running and retry queues
      operationId: getIssues
      responses:
        "200":
          description: Issue list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/IssuesResponse"
                  - $ref: "#/components/schemas/ErrorSnapshotResponse"

  /api/v1/{issue_identifier}:
    get:
      summary: Get issue detail by issue identifier
      operationId: getIssueByIdentifier
      parameters:
        - name: issue_identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Issue detail response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueDetailResponse"
        "404":
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/refresh:
    post:
      summary: Request an immediate poll/reconcile cycle
      operationId: requestRefresh
      responses:
        "202":
          description: Refresh accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "503":
          description: Orchestrator unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/activity:
    get:
      summary: Get recent runtime activity events
      operationId: getActivity
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: issue_identifier
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Activity payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ActivityResponse"
                  - $ref: "#/components/schemas/ErrorSnapshotResponse"

  /api/v1/activity/stream:
    get:
      summary: Stream activity events via SSE
      description: |
        Event stream emits these event names:

        - `snapshot`: initial activity snapshot payload (`ActivityResponse`)
        - `activity`: single activity event payload (`ActivityEvent`)
        - `keepalive`: heartbeat payload containing `at`
      operationId: streamActivity
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: issue_identifier
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                snapshot:
                  value: |
                    event: snapshot
                    data: {"generated_at":"2026-03-10T09:20:00Z","events":[]}

                    event: keepalive
                    data: {"at":"2026-03-10T09:20:15Z"}
        "503":
          description: Activity stream unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/config:
    get:
      summary: Get effective runtime configuration and validation status
      operationId: getConfig
      responses:
        "200":
          description: Runtime config payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"

  /api/v1/openapi.yaml:
    get:
      summary: Fetch this OpenAPI specification
      operationId: getOpenApiSpec
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string

components:
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    ErrorSnapshotResponse:
      type: object
      required: [generated_at, error]
      properties:
        generated_at:
          type: string
          format: date-time
        error:
          $ref: "#/components/schemas/ErrorEnvelope/properties/error"

    TokenUsage:
      type: object
      required: [input_tokens, output_tokens, total_tokens]
      properties:
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        seconds_running:
          type: number
          minimum: 0

    RunningSession:
      type: object
      required:
        - issue_id
        - issue_identifier
        - state
        - turn_count
        - tokens
      properties:
        issue_id:
          type: string
        issue_identifier:
          type: string
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        tracker_state:
          type: ["string", "null"]
        priority:
          type: ["integer", "null"]
        labels:
          type: array
          items:
            type: string
        url:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        session_id:
          type: ["string", "null"]
        turn_count:
          type: integer
          minimum: 0
        last_event:
          type: ["string", "null"]
        last_message:
          type: ["string", "null"]
        started_at:
          type: ["string", "null"]
          format: date-time
        last_event_at:
          type: ["string", "null"]
          format: date-time
        runtime_seconds:
          type: ["integer", "null"]
        phase:
          type: ["string", "null"]
        workspace_path:
          type: ["string", "null"]
        attempt:
          type: ["integer", "null"]
        tokens:
          $ref: "#/components/schemas/TokenUsage"

    RetryEntry:
      type: object
      required: [issue_id, issue_identifier, attempt]
      properties:
        issue_id:
          type: string
        issue_identifier:
          type: string
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        tracker_state:
          type: ["string", "null"]
        priority:
          type: ["integer", "null"]
        labels:
          type: array
          items:
            type: string
        url:
          type: ["string", "null"]
        attempt:
          type: integer
          minimum: 1
        due_at:
          type: ["string", "null"]
          format: date-time
        due_in_ms:
          type: ["integer", "null"]
        error:
          type: ["string", "null"]

    PollingStatus:
      type: object
      required: [checking, poll_interval_ms]
      properties:
        checking:
          type: boolean
        poll_interval_ms:
          type: integer
          minimum: 1
        next_poll_in_ms:
          type: ["integer", "null"]

    ServiceStatus:
      type: object
      required: [uptime_seconds, completed_count]
      properties:
        started_at:
          type: ["string", "null"]
          format: date-time
        uptime_seconds:
          type: integer
          minimum: 0
        completed_count:
          type: integer
          minimum: 0

    StateResponse:
      type: object
      required:
        - generated_at
        - counts
        - running
        - retrying
        - codex_totals
        - polling
        - service
      properties:
        generated_at:
          type: string
          format: date-time
        counts:
          type: object
          required: [running, retrying]
          properties:
            running:
              type: integer
              minimum: 0
            retrying:
              type: integer
              minimum: 0
        running:
          type: array
          items:
            $ref: "#/components/schemas/RunningSession"
        retrying:
          type: array
          items:
            $ref: "#/components/schemas/RetryEntry"
        codex_totals:
          $ref: "#/components/schemas/TokenUsage"
        rate_limits:
          type: ["object", "null"]
          additionalProperties: true
        polling:
          $ref: "#/components/schemas/PollingStatus"
        service:
          $ref: "#/components/schemas/ServiceStatus"
        poll_interval_ms:
          type: integer
          minimum: 1
          deprecated: true
        max_concurrent_agents:
          type: integer
          minimum: 1
        service_uptime_seconds:
          type: integer
          minimum: 0
          deprecated: true
        completed_count:
          type: integer
          minimum: 0

    IssueSummary:
      type: object
      required: [issue_identifier, issue_id, status, workspace, attempts]
      properties:
        issue_identifier:
          type: string
        issue_id:
          type: string
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        tracker_state:
          type: ["string", "null"]
        priority:
          type: ["integer", "null"]
        labels:
          type: array
          items:
            type: string
        url:
          type: ["string", "null"]
        status:
          type: string
          enum: [Running, RetryQueued]
        workspace:
          type: object
          required: [path]
          properties:
            path:
              type: string
        attempts:
          type: object
          required: [restart_count, current_retry_attempt]
          properties:
            restart_count:
              type: integer
              minimum: 0
            current_retry_attempt:
              type: ["integer", "null"]
        running:
          anyOf:
            - $ref: "#/components/schemas/RunningSession"
            - type: "null"
        retry:
          anyOf:
            - $ref: "#/components/schemas/RetryEntry"
            - type: "null"
        last_error:
          type: ["string", "null"]

    IssuesResponse:
      type: object
      required: [generated_at, counts, issues]
      properties:
        generated_at:
          type: string
          format: date-time
        counts:
          type: object
          required: [running, retrying, total]
          properties:
            running:
              type: integer
            retrying:
              type: integer
            total:
              type: integer
        issues:
          type: array
          items:
            $ref: "#/components/schemas/IssueSummary"

    ActivityEvent:
      type: object
      required: [issue_id, issue_identifier, event, at, tokens]
      properties:
        issue_id:
          type: string
        issue_identifier:
          type: string
        session_id:
          type: ["string", "null"]
        event:
          type: ["string", "null"]
        at:
          type: ["string", "null"]
          format: date-time
        message:
          type: ["string", "null"]
        tokens:
          $ref: "#/components/schemas/TokenUsage"

    ActivityResponse:
      type: object
      required: [generated_at, events]
      properties:
        generated_at:
          type: string
          format: date-time
        events:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"

    IssueDetailResponse:
      type: object
      required:
        - issue_identifier
        - issue_id
        - status
        - workspace
        - attempts
        - running
        - retry
        - recent_events
        - token_history
      properties:
        issue_identifier:
          type: string
        issue_id:
          type: string
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        tracker_state:
          type: ["string", "null"]
        priority:
          type: ["integer", "null"]
        labels:
          type: array
          items:
            type: string
        url:
          type: ["string", "null"]
        status:
          type: string
          enum: [running, retrying]
        workspace:
          type: object
          required: [path]
          properties:
            path:
              type: string
        attempts:
          type: object
          required: [restart_count, current_retry_attempt]
          properties:
            restart_count:
              type: integer
              minimum: 0
            current_retry_attempt:
              type: ["integer", "null"]
        running:
          anyOf:
            - $ref: "#/components/schemas/RunningSession"
            - type: "null"
        retry:
          anyOf:
            - $ref: "#/components/schemas/RetryEntry"
            - type: "null"
        recent_events:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"
        token_history:
          type: array
          items:
            type: object
            required: [at, total_tokens]
            properties:
              at:
                type: string
                format: date-time
              total_tokens:
                type: integer
                minimum: 0
        last_error:
          type: ["string", "null"]
        logs:
          type: object
          additionalProperties: true
        tracked:
          type: object
          additionalProperties: true

    RefreshResponse:
      type: object
      required: [queued, coalesced, requested_at, operations]
      properties:
        queued:
          type: boolean
        coalesced:
          type: boolean
        requested_at:
          type: string
          format: date-time
        operations:
          type: array
          items:
            type: string

    ConfigResponse:
      type: object
      required: [generated_at, workflow, effective_config, validation]
      properties:
        generated_at:
          type: string
          format: date-time
        workflow:
          type: object
          required: [path]
          properties:
            path:
              type: string
            prompt_template:
              type: ["string", "null"]
            raw_markdown:
              type: ["string", "null"]
            front_matter:
              type: object
              additionalProperties: true
        effective_config:
          type: object
          additionalProperties: true
        validation:
          type: object
          required:
            - workflow_file
            - tracker_kind
            - tracker_api_key
            - tracker_scope
            - runtime_provider
            - runtime_command
          properties:
            workflow_file:
              type: string
              enum: [ok, error]
            tracker_kind:
              type: string
              enum: [ok, error]
            tracker_api_key:
              type: string
              enum: [ok, error]
            tracker_scope:
              type: string
              enum: [ok, error]
            runtime_provider:
              type: string
              enum: [ok, error]
            runtime_command:
              type: string
              enum: [ok, error]
